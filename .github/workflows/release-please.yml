name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # release-type auto-detected from release-please-config.json
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
